schemaVersion: 1

duckdb:
  version: v1.5.4
  ciToolsVersion: v1.5.4

# Shared compatibility baseline. isUsed controls only whether an extension is
# installed and loaded by default in every enabled battery. It does not enable
# or disable any test battery.
defaultExtensions:
  - name: httpfs
    isUsed: true
  - name: mssql
    isUsed: true
    installFrom: community
  - name: ducklake
    isUsed: true
  - name: postgres_scanner
    isUsed: true

# Battery scheduling is independent from defaultExtensions:
# - isEnabled: false suppresses only that battery job;
# - disabling a battery never removes an extension from the shared baseline;
# - setting a default extension isUsed: false never disables its battery.
#
# Each battery explicitly declares its target extension in extensions. The
# resolver merges and de-duplicates it with the active defaults. Therefore a
# target can remain available to its own battery even when removed from the
# shared default baseline.
testBatteries:
  httpfs:
    isEnabled: true
    runner: standard
    repository: duckdb/duckdb-httpfs
    pin: c3f215ab360f04dc3d3d5305fa81849c0121f111
    tests: test/sql/*
    submodules: recursive
    setup: httpfs-services
    extensions:
      - name: httpfs
        isUsed: true
      - name: json
        isUsed: true
      - name: tpch
        isUsed: true
      - name: tpcds
        isUsed: true
      - name: icu
        isUsed: true
      - name: sqlite_scanner
        isUsed: true
    ignoredTests:
      - path: test/sql/copy/s3/parquet_s3_tpcds.test_slow
        reason: Requires TPC-DS answer fixtures that are not present in the standalone HTTPFS checkout
      - path: test/extension/autoloading_base.test
        reason: Assumes no dynamically installed extensions, while the compatibility battery intentionally installs multiple extensions

  ducklake:
    isEnabled: true
    runner: standard
    repository: duckdb/ducklake
    pin: d318a545571d7d46eb751fa2aa5f6f4389285d3c
    tests: test/sql/*
    submodules: recursive
    setup: ducklake-catalogs
    extensions:
      - name: ducklake
        isUsed: true
      - name: json
        isUsed: true
      - name: tpch
        isUsed: true
      - name: tpcds
        isUsed: true
      - name: icu
        isUsed: true
      - name: sqlite_scanner
        isUsed: true
    ignoredTests:
      - path: test/sql/data_inlining/postgres_identifier_limit.test
        reason: Test is specific to the PostgreSQL catalog profile
        profiles:
          - sqlite

  postgres_scanner:
    isEnabled: true
    runner: postgres-scanner
    repository: duckdb/duckdb-postgres
    pin: 8f813f9b9c9e52a9074a050a0be60f49160a6baa
    tests: test/sql/*
    submodules: recursive
    setup: postgres-17
    extensions:
      - name: postgres_scanner
        isUsed: true
      - name: json
        isUsed: true
      - name: tpch
        isUsed: true
      - name: tpcds
        isUsed: true
      - name: icu
        isUsed: true
    ignoredTests: []

  mssql:
    isEnabled: true
    runner: mssql-release
    repository: hugr-lab/mssql-extension
    pin: v0.2.1
    tests: test/sql/*
    submodules: false
    setup: sqlserver-2022
    extensions:
      - name: mssql
        isUsed: true
        installFrom: community
      - name: json
        isUsed: true
      - name: tpch
        isUsed: true
      - name: tpcds
        isUsed: true
      - name: icu
        isUsed: true
      - name: sqlite_scanner
        isUsed: true
      - name: azure
        isUsed: true
    ignoredTests:
      - path: test/sql/azure/azure_device_code.test
        reason: Requires Azure credential-chain parameters not supported by the DuckDB v1.5.4 Azure binary
      - path: test/sql/ctas/ctas_auto_tablock.test
        reason: Known MSSQL v0.2.1 CTAS compatibility failure under the pinned DuckDB v1.5.4 runtime
      - path: test/sql/ctas/ctas_if_not_exists.test
        reason: Known MSSQL v0.2.1 CTAS compatibility failure under the pinned DuckDB v1.5.4 runtime
      - path: test/sql/catalog/ddl_if_not_exists.test
        reason: MSSQL v0.2.1 returns a different SQL Server object-exists error message
