duckdb:
  version: v1.5.4
  ci_tools_version: v1.5.4

# Every compatibility job installs and loads this complete set.
always_load:
  - httpfs
  - ducklake
  - postgres_scanner
  - mssql

extensions:
  httpfs:
    repository: duckdb/duckdb-httpfs
    commit: c3f215ab360f04dc3d3d5305fa81849c0121f111
    test: test/*
    setup: upstream-httpfs-services

  ducklake:
    repository: duckdb/ducklake
    commit: d318a545571d7d46eb751fa2aa5f6f4389285d3c
    test: test/sql/*
    setup: upstream-ducklake-catalogs

  postgres_scanner:
    repository: duckdb/duckdb-postgres
    commit: 8f813f9b9c9e52a9074a050a0be60f49160a6baa
    test: test/sql/*
    setup: upstream-postgres-17

  # AI MAINTAINER NOTE — RELEASE TAG POLICY
  # Keep MSSQL pinned to the newest PUBLISHED RELEASE TAG, never to `main`.
  # Before changing this value, verify all of the following together:
  #   1. hugr-lab/mssql-extension has published the new tag;
  #   2. duckdb/community-extensions references that same tag/version;
  #   3. scripts/run-mssql-tests.sh still reuses the pinned release's Docker,
  #      seed SQL, smoke script and complete test/sql/* folder correctly.
  # Updating the tag is how this repository deliberately adopts upstream test
  # changes. Do not copy the upstream tests or SQL fixtures into this repository.
  mssql:
    repository: hugr-lab/mssql-extension
    tag: v0.2.1
    community_version: 0.2.1
    test: test/sql/*
    setup: upstream-sqlserver-2022
