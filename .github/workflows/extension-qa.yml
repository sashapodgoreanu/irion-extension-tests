name: DuckDB Extension Compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Prepare DuckDB runtime
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # AI MAINTAINER NOTE — DUCKDB RUNTIME CACHE CONTRACT
      # This cache contains the complete packaged DuckDB CLI + unittest runtime.
      # Keep the key deterministic and tied to every input that can change the
      # produced binaries. Never key it only by branch, workflow run or DuckDB
      # semantic version, and do not add a broad restore-key: a stale binary can
      # turn this compatibility suite into a false positive or false negative.
      # A cache miss must always be recoverable by running scripts/build.sh.
      - name: Calculate DuckDB runtime cache key
        id: duckdb-runtime-key
        shell: bash
        run: |
          set -Eeuo pipefail

          DUCKDB_SHA="$(git rev-parse HEAD:duckdb)"
          CI_TOOLS_SHA="$(git rev-parse HEAD:extension-ci-tools)"

          BUILD_INPUT_HASH="$({
            printf '%s\n' \
              'cache-schema=v1' \
              'runner=ubuntu-24.04' \
              'architecture=linux-amd64' \
              'duckdb-version=v1.5.4' \
              'ci-tools-version=v1.5.4' \
              "duckdb-sha=${DUCKDB_SHA}" \
              "ci-tools-sha=${CI_TOOLS_SHA}"
            git ls-files -s -- \
              .gitmodules \
              CMakeLists.txt \
              extension_config.cmake \
              Makefile \
              scripts/build.sh \
              src
          } | sha256sum | cut -d' ' -f1)"

          CACHE_KEY="duckdb-runtime-v1-ubuntu24-linux-amd64-${BUILD_INPUT_HASH}"

          echo "key=${CACHE_KEY}" >> "${GITHUB_OUTPUT}"
          echo "duckdb_sha=${DUCKDB_SHA}" >> "${GITHUB_OUTPUT}"
          echo "ci_tools_sha=${CI_TOOLS_SHA}" >> "${GITHUB_OUTPUT}"

          echo "DuckDB runtime cache key: ${CACHE_KEY}"
          echo "DuckDB commit: ${DUCKDB_SHA}"
          echo "extension-ci-tools commit: ${CI_TOOLS_SHA}"

      - name: Restore cached DuckDB runtime
        id: duckdb-runtime-cache
        uses: actions/cache@v4
        with:
          path: build/artifact
          key: ${{ steps.duckdb-runtime-key.outputs.key }}

      - name: Install build tools
        if: steps.duckdb-runtime-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake ninja-build python3

      - name: Build DuckDB runtime
        if: steps.duckdb-runtime-cache.outputs.cache-hit != 'true'
        env:
          DUCKDB_VERSION: v1.5.4
          CI_TOOLS_VERSION: v1.5.4
          BUILD_JOBS: 2
        run: bash scripts/build.sh

      - name: Validate restored or built runtime
        shell: bash
        run: |
          set -Eeuo pipefail

          test -f build/artifact/bin/duckdb
          test -f build/artifact/bin/unittest
          chmod +x build/artifact/bin/duckdb build/artifact/bin/unittest

          build/artifact/bin/duckdb --version
          build/artifact/bin/unittest --help >/dev/null

          {
            echo "cache_key=${{ steps.duckdb-runtime-key.outputs.key }}"
            echo "cache_hit=${{ steps.duckdb-runtime-cache.outputs.cache-hit }}"
            echo "duckdb_commit=${{ steps.duckdb-runtime-key.outputs.duckdb_sha }}"
            echo "ci_tools_commit=${{ steps.duckdb-runtime-key.outputs.ci_tools_sha }}"
          } >> build/artifact/logs/build-info.txt

      # The cache persists the runtime between workflow runs. The artifact remains
      # necessary because it distributes that exact runtime to all test jobs in
      # the current run without each matrix job restoring the cache independently.
      - name: Upload shared build
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-v1.5.4-linux-amd64
          path: build/artifact/
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test ${{ matrix.name }}
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: httpfs
            repository: duckdb/duckdb-httpfs
            commit: c3f215ab360f04dc3d3d5305fa81849c0121f111
            test: test/*
            submodules: recursive
          - name: ducklake
            repository: duckdb/ducklake
            commit: d318a545571d7d46eb751fa2aa5f6f4389285d3c
            test: test/*
            submodules: recursive

          # AI MAINTAINER NOTE — MSSQL RELEASE PIN
          # This must remain a published release tag, never `main` or another moving ref.
          # When a newer MSSQL release is published, update this tag together with:
          #   - config/extensions.yml;
          #   - the expected version in scripts/run-mssql-tests.sh (derived from the tag);
          #   - confirmation that duckdb/community-extensions points to the same release.
          # The test runner deliberately consumes Docker, seed SQL, smoke tests and
          # test/sql/* from this exact checkout so upstream changes become visible only
          # when the release pin is intentionally advanced.
          - name: mssql
            repository: hugr-lab/mssql-extension
            commit: 3c100e9124553cf8578f3959cc4d6402811da3f6
            test: test/sql/*
            submodules: "false"

    steps:
      - name: Checkout QA repository
        uses: actions/checkout@v4

      - name: Checkout upstream tests
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.commit }}
          path: upstream/${{ matrix.name }}
          fetch-depth: 1
          submodules: ${{ matrix.submodules }}

      - name: Download shared build
        uses: actions/download-artifact@v4
        with:
          name: duckdb-v1.5.4-linux-amd64
          path: build/artifact

      - name: Restore executable permissions
        run: chmod +x build/artifact/bin/duckdb build/artifact/bin/unittest

      - name: Install HTTPFS service dependency
        if: matrix.name == 'httpfs'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq squid
          docker compose version

      - name: Verify MSSQL container runtime
        if: matrix.name == 'mssql'
        run: docker compose version

      - name: Run HTTPFS or DuckLake upstream tests
        if: matrix.name != 'mssql'
        env:
          ARTIFACT_DIR: build/artifact
        run: |
          bash scripts/run-tests.sh \
            '${{ matrix.name }}' \
            '${{ github.workspace }}/upstream/${{ matrix.name }}' \
            '${{ matrix.test }}'

      - name: Run pinned MSSQL release tests
        if: matrix.name == 'mssql'
        env:
          ARTIFACT_DIR: build/artifact
          MSSQL_RELEASE_TAG: ${{ matrix.commit }}
        run: |
          bash scripts/run-mssql-tests.sh \
            '${{ github.workspace }}/upstream/mssql' \
            '${{ matrix.test }}'

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name }}
          path: build/logs/${{ matrix.name }}/
          if-no-files-found: warn
          retention-days: 7
