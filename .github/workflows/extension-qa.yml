name: DuckDB Extension Compatibility

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  configure:
    name: Resolve extension configuration
    runs-on: ubuntu-24.04
    outputs:
      matrix: ${{ steps.resolve.outputs.matrix }}
      duckdb_version: ${{ steps.resolve.outputs.duckdb_version }}
      ci_tools_version: ${{ steps.resolve.outputs.ci_tools_version }}
      enabled_batteries: ${{ steps.resolve.outputs.enabled_batteries }}

    steps:
      - name: Checkout QA repository
        uses: actions/checkout@v4

      - name: Install configuration parser
        run: |
          python3 -m venv .venv
          .venv/bin/python -m pip install --disable-pip-version-check PyYAML==6.0.2

      - name: Validate configuration and build matrix
        id: resolve
        run: .venv/bin/python scripts/resolve-extension-config.py config/extensions.yml >>"${GITHUB_OUTPUT}"

      - name: Report enabled batteries
        run: |
          echo "DuckDB: ${{ steps.resolve.outputs.duckdb_version }}"
          echo "Enabled batteries: ${{ steps.resolve.outputs.enabled_batteries }}"

  build:
    name: Prepare DuckDB runtime
    needs: configure
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: recursive

      # This cache contains only the packaged DuckDB CLI + unittest runtime.
      # Battery pins and extension lists do not enter the artifact; each test job
      # installs its resolved extension set in an isolated HOME.
      - name: Calculate DuckDB runtime cache key
        id: duckdb-runtime-key
        shell: bash
        run: |
          set -Eeuo pipefail

          DUCKDB_SHA="$(git rev-parse HEAD:duckdb)"
          CI_TOOLS_SHA="$(git rev-parse HEAD:extension-ci-tools)"

          BUILD_INPUT_HASH="$({
            printf '%s\n' \
              'cache-schema=v2' \
              'runner=ubuntu-24.04' \
              'architecture=linux-amd64' \
              'duckdb-version=${{ needs.configure.outputs.duckdb_version }}' \
              'ci-tools-version=${{ needs.configure.outputs.ci_tools_version }}' \
              "duckdb-sha=${DUCKDB_SHA}" \
              "ci-tools-sha=${CI_TOOLS_SHA}"
            git ls-files -s -- \
              .gitmodules \
              CMakeLists.txt \
              extension_config.cmake \
              Makefile \
              scripts/build.sh \
              src
          } | sha256sum | cut -d' ' -f1)"

          CACHE_KEY="duckdb-runtime-v2-ubuntu24-linux-amd64-${BUILD_INPUT_HASH}"
          echo "key=${CACHE_KEY}" >>"${GITHUB_OUTPUT}"
          echo "duckdb_sha=${DUCKDB_SHA}" >>"${GITHUB_OUTPUT}"
          echo "ci_tools_sha=${CI_TOOLS_SHA}" >>"${GITHUB_OUTPUT}"

      - name: Restore cached DuckDB runtime
        id: duckdb-runtime-cache
        uses: actions/cache@v4
        with:
          path: build/artifact
          key: ${{ steps.duckdb-runtime-key.outputs.key }}

      - name: Install build tools
        if: steps.duckdb-runtime-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential cmake ninja-build python3

      - name: Build DuckDB runtime
        if: steps.duckdb-runtime-cache.outputs.cache-hit != 'true'
        env:
          DUCKDB_VERSION: ${{ needs.configure.outputs.duckdb_version }}
          CI_TOOLS_VERSION: ${{ needs.configure.outputs.ci_tools_version }}
          BUILD_JOBS: 2
        run: bash scripts/build.sh

      - name: Validate restored or built runtime
        shell: bash
        run: |
          set -Eeuo pipefail
          test -f build/artifact/bin/duckdb
          test -f build/artifact/bin/unittest
          chmod +x build/artifact/bin/duckdb build/artifact/bin/unittest
          build/artifact/bin/duckdb --version
          build/artifact/bin/unittest --help >/dev/null

          {
            echo "cache_key=${{ steps.duckdb-runtime-key.outputs.key }}"
            echo "cache_hit=${{ steps.duckdb-runtime-cache.outputs.cache-hit }}"
            echo "duckdb_commit=${{ steps.duckdb-runtime-key.outputs.duckdb_sha }}"
            echo "ci_tools_commit=${{ steps.duckdb-runtime-key.outputs.ci_tools_sha }}"
          } >>build/artifact/logs/build-info.txt

      - name: Upload shared build
        uses: actions/upload-artifact@v4
        with:
          name: duckdb-${{ needs.configure.outputs.duckdb_version }}-linux-amd64
          path: build/artifact/
          if-no-files-found: error
          retention-days: 7

  test:
    name: Test ${{ matrix.name }}
    needs:
      - configure
      - build
    runs-on: ubuntu-24.04
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.configure.outputs.matrix) }}

    steps:
      - name: Checkout QA repository
        uses: actions/checkout@v4

      - name: Checkout upstream tests
        uses: actions/checkout@v4
        with:
          repository: ${{ matrix.repository }}
          ref: ${{ matrix.pin }}
          path: upstream/${{ matrix.name }}
          fetch-depth: 1
          submodules: ${{ matrix.submodules }}

      - name: Download shared build
        uses: actions/download-artifact@v4
        with:
          name: duckdb-${{ needs.configure.outputs.duckdb_version }}-linux-amd64
          path: build/artifact

      - name: Restore executable permissions
        run: |
          chmod +x build/artifact/bin/duckdb build/artifact/bin/unittest
          chmod +x scripts/*.sh scripts/*.py

      - name: Install HTTPFS service dependency
        if: matrix.setup == 'httpfs-services'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq squid
          docker compose version

      - name: Setup PostgreSQL test service
        if: matrix.setup == 'postgres-17'
        uses: ikalnytskyi/action-setup-postgres@v8
        with:
          postgres-version: 17
          username: postgres
          password: postgres
          database: postgres
          port: 5432

      - name: Verify SQL Server container runtime
        if: matrix.setup == 'sqlserver-2022'
        run: docker compose version

      - name: Run test battery
        env:
          ARTIFACT_DIR: build/artifact
          BATTERY_CONFIG_JSON: ${{ toJSON(matrix) }}
        run: |
          mkdir -p build/config
          printf '%s\n' "${BATTERY_CONFIG_JSON}" >"build/config/${{ matrix.name }}.json"
          bash scripts/run-test-battery.sh \
            "build/config/${{ matrix.name }}.json" \
            "${{ github.workspace }}/upstream/${{ matrix.name }}"

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: logs-${{ matrix.name }}
          path: build/logs/${{ matrix.name }}/
          if-no-files-found: warn
          retention-days: 7
